specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft Azure
providerId: azure
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud Computing
  - Databases
  - Infrastructure
  - Machine Learning
  - Networking
  - Platform as a Service
  - Storage
description: Microsoft Azure is a multi-product platform with hundreds of services, each independently
  priced. The platform offers pay-as-you-go pricing, Azure Reservations (1- or 3-year committed-use discount),
  Azure Savings Plans for compute, free tier credits ($200 / 30 days for new accounts plus 12 months
  of select free services), and enterprise agreements (EA) with negotiated discounts. Use the Azure pricing
  calculator for service-level rates.
sources:
  - https://azure.microsoft.com/en-us/pricing/
  - https://azure.microsoft.com/en-us/pricing/calculator/
  - https://azure.microsoft.com/en-us/free/
plans:
  - id: azure-free-account
    name: Free Account
    type: freemium
    description: 12 months of select services free, $200 credit for first 30 days, 55+ services always
      free.
    entries:
      - label: Sign-up credit
        name: signup_credit
        type: quota
        metric: USD
        limit: 200
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Free-tier services
        name: free_tier
        type: quota
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: $200 credit (30 days)
      - name: 12 months free of select services
      - name: 55+ always-free services
  - id: azure-pay-as-you-go
    name: Pay-As-You-Go
    type: pay-as-you-go
    description: Per-service consumption pricing across compute, storage, network, databases, AI, and
      hundreds of other services. Use the Azure Pricing Calculator for service-level rates.
    entries:
      - label: Platform consumption
        name: platform
        type: metered
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://azure.microsoft.com/en-us/pricing/calculator/
        userMultiplied: false
    elements:
      - name: 200+ services
      - name: Per-second / per-minute / per-GB metering by service
      - name: No upfront commitment
  - id: azure-reservations
    name: Azure Reservations
    type: subscription
    description: 1-year or 3-year reserved capacity for compute, databases, and other eligible services.
      Up to ~72% savings vs pay-as-you-go.
    entries:
      - label: 1-year reservation
        name: reservation_1y
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: discount up to ~72% vs PAYG
        userMultiplied: false
      - label: 3-year reservation
        name: reservation_3y
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: discount up to ~72% vs PAYG
        userMultiplied: false
    elements:
      - name: Reserved VM Instances
      - name: Reserved Capacity (SQL DB, Cosmos DB, Cache, etc.)
      - name: Cancellation / exchange flexibility
  - id: azure-savings-plans
    name: Azure Savings Plan for Compute
    type: subscription
    description: Hourly-spend commitment (1- or 3-year) across compute services for up to 65% savings
      vs PAYG. More flexible than reservations across regions/SKUs.
    entries:
      - label: Hourly compute commitment
        name: savings_plan
        type: subscription
        metric: USD_per_hour
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: discount up to ~65% vs PAYG
        userMultiplied: false
    elements:
      - name: Cross-region compute coverage
      - name: VM, container, and serverless coverage
  - id: azure-enterprise-agreement
    name: Enterprise Agreement
    type: enterprise
    description: Negotiated enterprise contract with Azure Prepayment, custom discounts, dedicated support,
      and Microsoft Customer Agreement billing.
    entries:
      - label: Negotiated rate
        name: ea
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Azure Prepayment / monetary commitment
      - name: Negotiated discounts
      - name: Microsoft Unified / Premier Support
      - name: Cost Management + FinOps tooling
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
