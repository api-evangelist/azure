specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Microsoft Azure
providerId: azure
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud Computing
  - Infrastructure
  - Platform as a Service
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Microsoft Azure: hyperscale cloud platform with pay-as-you-go consumption
  metering across hundreds of services, augmented by reservations, savings plans, and enterprise agreements.
  Microsoft is a founding member of the FinOps Foundation and a primary contributor to the FOCUS specification;
  Azure Cost Management + Billing exports natively conform to FOCUS 1.0/1.1.'
sources:
  - https://azure.microsoft.com/en-us/pricing/
  - https://learn.microsoft.com/en-us/azure/cost-management-billing/
  - https://learn.microsoft.com/en-us/azure/cost-management-billing/dataset-schema/cost-usage-details-focus
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Microsoft Corporation
serviceCategory: Cloud Infrastructure
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD/EUR/GBP/local
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: Microsoft Azure
  ServiceCategory: Cloud Infrastructure
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  PricingCategory: Pay-As-You-Go
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: compute_hours
    description: Virtual machine, container, and serverless compute time
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - sku
      - vm_family
      - subscription
      - resource_group
  - name: storage_capacity
    description: Blob, file, queue, table, and disk storage
    unit: GB-month
    aggregation: avg
    dimensions:
      - region
      - storage_tier
      - redundancy
  - name: data_transfer
    description: Egress bandwidth across regions, AZs, internet
    unit: GB
    aggregation: sum
    dimensions:
      - source_region
      - destination
  - name: api_transactions
    description: Service-specific transaction count (Storage, Cosmos DB, Functions, etc.)
    unit: transaction
    aggregation: sum
    dimensions:
      - service
      - region
  - name: licenses_subscriptions
    description: Per-seat / per-month subscriptions for managed offerings
    unit: seat
    aggregation: max
    dimensions:
      - product
  - name: reservations_savings_plans
    description: Committed-use commitments billed monthly across covered SKUs
    unit: month
    aggregation: sum
    dimensions:
      - term
      - scope
principles:
  - name: Visibility
    description: Use Azure Cost Management + Billing, FOCUS-aligned cost exports to ADLS Gen2, and Azure
      Workbooks / Power BI for near-real-time spend visibility down to resource and tag.
  - name: Allocation
    description: Apply tags, management groups, subscriptions, and resource groups to attribute spend
      to teams, products, and environments; configure tag inheritance and tag policy.
  - name: Optimization
    description: Use Azure Advisor recommendations; right-size VMs; adopt Reservations and Azure Savings
      Plan for stable workloads; use Spot instances for fault-tolerant compute; enable autoscale; clean
      up unattached disks and idle resources.
  - name: Accountability
    description: Set Cost Management budgets with alerts; assign subscription / resource-group owners;
      run monthly FinOps reviews; chargeback / showback via FOCUS exports.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
