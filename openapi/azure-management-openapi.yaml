components:
  securitySchemes:
    azure_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: Impersonate your user account
  schemas:
    Subscription:
      type: object
      description: Subscription information.
      properties:
        id:
          type: string
          readOnly: true
        subscriptionId:
          type: string
          readOnly: true
        displayName:
          type: string
        state:
          type: string
          enum:
          - Enabled
          - Disabled
          - Deleted
          - PastDue
          - Warned
        subscriptionPolicies:
          type: object
          properties:
            locationPlacementId:
              type: string
            quotaId:
              type: string
            spendingLimit:
              type: string
              enum:
              - On
              - Off
              - CurrentPeriodOff
        authorizationSource:
          type: string
        managedByTenants:
          type: array
          items:
            type: object
            properties:
              tenantId:
                type: string
    SubscriptionListResult:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
        nextLink:
          type: string
    ResourceGroup:
      type: object
      description: Resource group information.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        type:
          type: string
          readOnly: true
        location:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        properties:
          type: object
          properties:
            provisioningState:
              type: string
              readOnly: true
    ResourceGroupListResult:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/ResourceGroup'
        nextLink:
          type: string
    GenericResource:
      type: object
      description: Resource information.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        type:
          type: string
        location:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        kind:
          type: string
        managedBy:
          type: string
        sku:
          type: object
          properties:
            name:
              type: string
            tier:
              type: string
            capacity:
              type: integer
    ResourceListResult:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/GenericResource'
        nextLink:
          type: string
