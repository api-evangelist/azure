naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Management
  description: Workflow capability for managing Microsoft Azure resources. Used by cloud engineers and DevOps teams.
  tags:
  - Azure
  - Cloud
  - Management
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AZURE_SUBSCRIPTION_ID: AZURE_SUBSCRIPTION_ID
    AZURE_ACCESS_TOKEN: AZURE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: azure
    baseUri: https://management.azure.com
    description: Microsoft Azure REST API
    authentication:
      type: bearer
      token: '{{AZURE_ACCESS_TOKEN}}'
    resources:
    - name: subscription
      path: /subscriptions/{subscriptionId}/providers/Microsoft.Subscription/Subscriptions
      description: Manage Subscription resources
      operations:
      - name: list-subscriptions
        method: GET
        description: List all Subscription resources
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Azure subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: resource-group
      path: /subscriptions/{subscriptionId}/providers/Microsoft.ResourceGroup/ResourceGroups
      description: Manage ResourceGroup resources
      operations:
      - name: list-resource-groups
        method: GET
        description: List all ResourceGroup resources
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Azure subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: resource
      path: /subscriptions/{subscriptionId}/providers/Microsoft.Resource/Resources
      description: Manage Resource resources
      operations:
      - name: list-resources
        method: GET
        description: List all Resource resources
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Azure subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: provider
      path: /subscriptions/{subscriptionId}/providers/Microsoft.Provider/Providers
      description: Manage Provider resources
      operations:
      - name: list-providers
        method: GET
        description: List all Provider resources
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Azure subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8084
    namespace: azure-management-api
    description: Unified REST API for Microsoft Azure management.
    resources:
    - path: /v1/resources
      name: resources
      description: Resource management
      operations:
      - method: GET
        name: list
        description: List all resources
        call: azure.list-subscriptions
        with:
          subscriptionId: rest.subscriptionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9094
    namespace: azure-management-mcp
    transport: http
    description: MCP server for AI-assisted Microsoft Azure management.
    tools:
    - name: list-subscriptions
      description: List Subscription resources
      hints:
        readOnly: true
        openWorld: true
      call: azure.list-subscriptions
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-resource-groups
      description: List ResourceGroup resources
      hints:
        readOnly: true
        openWorld: true
      call: azure.list-resource-groups
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-resources
      description: List Resource resources
      hints:
        readOnly: true
        openWorld: true
      call: azure.list-resources
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-providers
      description: List Provider resources
      hints:
        readOnly: true
        openWorld: true
      call: azure.list-providers
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
