specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Microsoft Azure
providerId: azure
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Cloud Computing
  - Infrastructure
  - Platform as a Service
description: Azure rate limits and quotas are defined per-service rather than at the platform level.
  Azure Resource Manager (ARM) enforces a default control-plane throttle of 12,000 read and 1,200 write
  requests per hour per subscription per region (with bursting), and each individual Azure service publishes
  its own data-plane and control-plane limits (e.g., Storage 20-40k req/s per account, Key Vault 2,000-4,000
  per 10s per vault). See per-service quota pages for specifics.
sources:
  - https://learn.microsoft.com/en-us/azure/azure-resource-manager/management/request-limits-and-throttling
  - https://learn.microsoft.com/en-us/azure/azure-resource-manager/management/azure-subscription-service-limits
headers:
  remaining: x-ms-ratelimit-remaining-subscription-reads
  remainingWrites: x-ms-ratelimit-remaining-subscription-writes
  retryAfter: Retry-After
  requestId: x-ms-request-id
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: ARM read requests (control plane)
    scope: subscription/region
    metric: requests_per_hour
    limit: 12000
    timeFrame: hour
    notes: Token-bucket; bursts allowed. Refill rate enforces sustained throughput.
  - name: ARM write requests (control plane)
    scope: subscription/region
    metric: requests_per_hour
    limit: 1200
    timeFrame: hour
  - name: Tenant-level read requests (Microsoft Graph / Entra)
    scope: tenant
    metric: varies
    limit: see service-specific quotas
  - name: Per-service data-plane limits
    scope: account/region/service
    metric: varies
    limit: see service-specific quota pages (Storage, Cosmos DB, Key Vault, AKS, etc.)
policies:
  - name: Token-bucket throttling
    description: Most Azure services use token-bucket throttling with a burst size and a refill rate.
      Returns 429 with Retry-After when the bucket is empty.
  - name: Quota request
    description: Subscription-level quotas (cores, IPs, storage accounts, etc.) can be raised via the
      Azure portal Quotas blade or by support ticket.
  - name: Backoff
    description: Honor Retry-After header. Use exponential backoff with jitter for transient 429/503
      responses.
  - name: Per-service variation
    description: Each Azure service publishes its own throttling matrix; consult the service-specific
      limits page (e.g. /azure/{service}/quotas, /azure/{service}/service-limits).
maintainers:
